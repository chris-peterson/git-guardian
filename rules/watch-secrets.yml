name: watch-secrets

rules:
  block:
    - name: cat SSH private keys
      pattern: 'cat\s+.*(/\.ssh/id_|~\/\.ssh/id_)'
      reason: exposes SSH private keys
      ref: https://man.openbsd.org/ssh.1

    - name: cat cloud credentials
      pattern: 'cat\s+.*(\.aws/credentials|\.gcp/|\.azure/|\.config/gcloud)'
      reason: exposes cloud provider credentials
      ref: https://docs.aws.amazon.com/cli/latest/userguide/cli-configure-files.html

    - name: expose secrets
      pattern: '(?i)(echo|printf|cat|less|more|head|tail)\s+.*(secret|token|password|credential|api.?key|private.?key)'
      reason: may expose secret values
      ref: https://cwe.mitre.org/data/definitions/532.html

    - name: export secrets inline
      pattern: '(?i)export\s+\w*(SECRET|TOKEN|PASSWORD|API.?KEY|PRIVATE.?KEY|DATABASE_URL)\w*='
      reason: hardcodes secrets in shell environment
      ref: https://cwe.mitre.org/data/definitions/798.html

    - name: cat .env files
      pattern: 'cat\s+.*\.env\b'
      reason: environment files often contain secrets
      ref: https://12factor.net/config

    - name: cat PEM/key files
      pattern: 'cat\s+.*(\.pem|\.key|\.crt|\.cert)\b'
      reason: may expose private keys or certificates
      ref: https://man.openbsd.org/openssl.1

    - name: env / printenv
      pattern: '\b(env|printenv)\b'
      reason: dumps all environment variables which may include secrets
      ref: https://man7.org/linux/man-pages/man1/env.1.html

  ask:
    - name: cat dotfiles
      pattern: 'cat\s+.*~/?\.'
      reason: may expose sensitive configuration
      ref: https://wiki.archlinux.org/title/Dotfiles
